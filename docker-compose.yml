services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carscaner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/carscaner
      JWT_SECRET: super-secret-jwt-key-for-carscaner-2024
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./backend
    restart: unless-stopped
    command: ["python", "-m", "worker.scheduler"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/carscaner
      SCRAPER_MAX_PAGES: "15"
      SCRAPER_INTERVAL_MINUTES: "60"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      API_URL: http://backend:8000/api
    depends_on:
      - backend

volumes:
  pgdata:
