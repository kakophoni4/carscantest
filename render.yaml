databases:
  - name: carscaner-db
    plan: free
    databaseName: carscaner
    user: carscaner_user
    ipAllowList: []

services:
  - type: web
    name: carscaner-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carscaner-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://carscaner-frontend.onrender.com"]'
      - key: RUN_WORKER
        value: "true"
      - key: SCRAPER_MAX_PAGES
        value: "5"
      - key: SCRAPER_INTERVAL_MINUTES
        value: "60"
    healthCheckPath: /api/health

  - type: web
    name: carscaner-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://carscaner-backend.onrender.com/api
